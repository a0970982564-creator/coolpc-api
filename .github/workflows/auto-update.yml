name: 每日自動更新原價屋時價

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v4

    - name: 設定最新 Node.js 22 環境 (全面支援全域安全 Fetch)
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: 執行自動更新腳本抓取時價
      run: node updater.js

    - name: 自動 Commit 並 Push 最新價格回儲存庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add prices.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動同步今日原價屋最新時價" && git push)
