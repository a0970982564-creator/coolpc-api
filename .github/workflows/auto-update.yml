name: 每日自動更新原價屋時價

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 賦予機器人寫入儲存庫的權限

    steps:
    - name: 1. 檢查程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Node.js 22 環境
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: 3. 執行自動更新腳本
      run: node updater.js

    - name: 4. 自動 Commit 並 Push 最新價格
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add prices.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動同步今日原價屋最新時價" && git push)
