name: 每日自動更新原價屋時價

on:
  schedule:
    # 每天台灣時間早上 6:00 自動執行一次 (UTC 22:00)
    - cron: '0 22 * * *'
  workflow_dispatch: # 允許你隨時手動點擊按鈕更新

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 賦予機器人修改你 prices.json 的權限

    steps:
    - name: 檢查程式碼
      uses: actions/checkout@v4

    - name: 設定 Node.js 環境
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: 執行自動更新腳本抓取時價
      run: node updater.js

    - name: 自動 Commit 並 Push 最新價格回儲存庫
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add prices.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動同步今日原價屋最新時價" && git push)
